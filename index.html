<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoto [G.M] | Hub Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-neon: #00ff41; /* Verde Matrix/Neon */
            --secondary-neon: #bc13fe; /* Morado Neon */
            --yt-red: #ff0000; /* Rojo YouTube */
            --bg-dark: #0a0a0a;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Contador de Visitas */
        .visit-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--primary-neon);
            padding: 10px 15px;
            border-radius: 5px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--primary-neon);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--secondary-neon);
            box-shadow: 0 0 20px var(--secondary-neon);
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            margin: 10px 0;
            letter-spacing: 2px;
            color: #fff;
        }

        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--primary-neon);
            margin-bottom: 30px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--primary-neon);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary-neon);
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 65, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 65, 0); }
        }

        /* Botones Generales */
        .btn-link {
            display: block;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        /* Estilos Específicos */
        .kick-btn { border: 2px solid var(--primary-neon); }
        .kick-btn:hover { background: var(--primary-neon); color: black; box-shadow: 0 0 25px var(--primary-neon); }

        .youtube-btn { border: 2px solid var(--yt-red); }
        .youtube-btn:hover { background: var(--yt-red); box-shadow: 0 0 25px var(--yt-red); transform: translateY(-3px); }

        .tiktok-btn { border: 2px solid #00f2ea; }
        .tiktok-btn:hover { background: #00f2ea; color: black; box-shadow: 0 0 25px #00f2ea; }

        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            opacity: 0.6;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="visit-counter">
        VISITAS: <span id="count">0000</span>
    </div>

    <div class="container">
        <img src="https://github.com/YotoGM.png" alt="Yoto [G.M]" class="profile-img">
        
        <h1>YOTO [G.M]</h1>
        <div class="status">
            <div class="pulse"></div>
            <span>● ONLINE</span>
        </div>

        <a href="https://kick.com/yotogm" target="_blank" class="btn-link kick-btn">
            <div class="btn-content">
                <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Kick_logo.svg" alt="Kick" class="btn-icon">
                <span>KICK LIVE</span>
            </div>
        </a>

        <a href="https://www.youtube.com/@YotoGM" target="_blank" class="btn-link youtube-btn">
            <div class="btn-content">
                <img src="https://www.youtube.com/@YotoG.M" alt="YouTube" class="btn-icon">
                <span>YOUTUBE</span>
            </div>
        </a>

        <a href="https://www.tiktok.com/@yotogm" target="_blank" class="btn-link tiktok-btn">
            <div class="btn-content">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/34/Ionicons_logo-tiktok.svg" alt="TikTok" class="btn-icon">
                <span>TIKTOK</span>
            </div>
        </a>

        <footer>
            © 2026 JOCTHAN M. | TODOS LOS DERECHOS RESERVADOS
        </footer>
    </div>

    <script>
        // Lógica del contador de visitas (CountAPI)
        async function updateCounter() {
            try {
                // Reemplaza 'yotogm-hub' con un nombre único para tu página
                const response = await fetch('https://api.countapi.xyz/hit/yotogm.github.io/visits');
                const data = await response.json();
                document.getElementById('count').innerText = data.value.toString().padStart(4, '0');
            } catch (error) {
                console.log("Error al cargar el contador");
            }
        }
        updateCounter();
    </script>
</body>
</html>
