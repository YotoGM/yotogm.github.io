<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoto[G.M] | Hub Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --fondo: #050505;
            --morado-vivo: #bc13fe;
            --verde-neon: #39FF14;
            --cristal: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--fondo);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(188, 19, 254, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(57, 255, 20, 0.1) 0%, transparent 40%);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background: var(--cristal);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(188, 19, 254, 0.3);
            border-radius: 24px;
            padding: 50px 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* Estilo para tu imagen de Logo */
        .logo-img {
            width: 100%;
            max-width: 280px;
            height: auto;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 15px var(--morado-vivo));
        }

        /* Estilo para la nueva descripción */
        .descripcion {
            font-family: 'Orbitron', sans-serif;
            color: var(--verde-neon);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 0 5px rgba(57, 255, 20, 0.5);
        }

        .card::before {
            content: "";
            position: absolute;
            top: -2px; left: -2px;
            width: 50px; height: 50px;
            border-top: 3px solid var(--verde-neon);
            border-left: 3px solid var(--verde-neon);
            border-radius: 24px 0 0 0;
        }

        .status {
            color: var(--verde-neon);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .punto-vivo {
            width: 8px; height: 8px;
            background-color: var(--verde-neon);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--verde-neon);
            animation: pulso 1.5s infinite;
        }

        @keyframes pulso {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .boton {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            padding: 16px;
            background: linear-gradient(45deg, rgba(188, 19, 254, 0.1), transparent);
            color: white;
            text-decoration: none;
            border: 1px solid rgba(188, 19, 254, 0.5);
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .boton:hover {
            border-color: var(--verde-neon);
