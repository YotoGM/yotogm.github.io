<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoto[G.M] | Hub Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --fondo: #050505;
            --morado: #bc13fe;
            --verde: #39FF14;
            --kick-verde: #53fc18;
            --youtube-rojo: #FF0000;
            --facebook-azul: #1877F2;
            --tiktok-cian: #25f4ee;
            --tiktok-rosa: #fe2c55;
        }

        /* --- ANIMACIONES --- */
        
        @keyframes flowText {
            0% { background-position: 0% 50%; transform: scale(1); filter: drop-shadow(0 0 5px var(--verde)); }
            50% { background-position: 100% 50%; transform: scale(1.08); filter: drop-shadow(0 0 20px var(--morado)); }
            100% { background-position: 0% 50%; transform: scale(1); filter: drop-shadow(0 0 5px var(--verde)); }
        }

        @keyframes pulse {
            0% { opacity: 1; text-shadow: 0 0 8px var(--verde); }
            50% { opacity: 0.4; text-shadow: 0 0 0px var(--verde); }
            100% { opacity: 1; text-shadow: 0 0 8px var(--verde); }
        }

        @keyframes logo-glow-pulse {
            0%, 100% { filter: drop-shadow(0 0 10px var(--morado)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 25px var(--morado)) brightness(1.2); transform: scale(1.03); }
        }

        body {
            background-color: var(--fondo);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(188, 19, 254, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(57, 255, 20, 0.1) 0%, transparent 40%);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 0; /* Espacio extra arriba y abajo */
            position: relative;
        }

        /* FRASE SUPERIOR POTENCIADA */
        .top-phrase {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem; /* Letras mucho más grandes */
            font-weight: 900; /* Grosor máximo */
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 40px; /* Más separación de la tarjeta */
            margin-top: -20px; /* Sube la posición un poco */
            text-align: center;
            background: linear-gradient(-45deg, var(--verde), #ffffff, var(--morado), #ffffff);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: flowText 3s infinite ease-in-out;
            line-height: 1.2;
        }

        .page-counter {
            position: fixed;
            top: 20px;
            right: 25px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
        }

        .page-counter i { color: var(--morado); }
        .page-counter span { color: var(--verde); font-weight: bold; }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(188, 19, 254, 0.4);
            border-radius: 24px;
            padding: 40px 30px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }

        .logo-img {
            width: 100%;
            max-width: 230px;
            height: auto;
            margin-bottom: 15px;
            animation: logo-glow-pulse 4s infinite ease-in-out;
        }

        .descripcion {
            font-family: 'Orbitron', sans-serif;
            color: var(--verde);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        .status {
            color: var(--verde);
            font-size: 0.8rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
            animation: pulse 2s infinite ease-in-out;
            font-weight: bold;
        }

        .boton {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
            padding: 16px;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            height: 60px;
            box-sizing: border-box;
        }

        /* KICK */
        .k-pixel-logo {
            width: 24px; height: 24px; background: var(--kick-verde); color: #000;
            font-family: 'Press Start 2P', cursive; font-size: 12px;
            display: flex; align-items: center; justify-content: center;
            position: relative; box-shadow: 0 -4px 0 -2px var(--fondo), 0 4px 0 -2px var(--fondo);
            flex-shrink: 0;
        }
        .btn-kick { background: #000; border: 1px solid var(--kick-verde); }
        .kick-text { color: var(--kick-verde); font-family: 'Press Start 2P', cursive; font-size: 13px; margin-top: 3px; }
        .btn-kick:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--kick-verde); }

        /* YOUTUBE */
        .btn-youtube { background: #000; border: 1px solid var(--youtube-rojo); }
        .btn-youtube i { color: var(--youtube-rojo); font-size: 1.4rem; }
        .btn-youtube:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--youtube-rojo); }

        /* FACEBOOK */
        .btn-facebook { background: var(--facebook-azul); border: 2px solid #ffffff; color: #ffffff; }
        .btn-facebook:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 255, 255, 0.4); }

        /* TIKTOK */
        .btn-tiktok {
            background: #000; border: 1px solid var(--tiktok-rosa);
            box-shadow: -2px -2px 0px var(--tiktok-cian), 2px 2px 0px var(--tiktok-rosa);
        }
        .btn-tiktok:hover { transform: scale(1.05); box-shadow: -5px 0 20px var(--tiktok-cian), 5px 0 20px var(--tiktok-rosa); }

        .rights-text {
            margin-top: 30px; font-size: 0.7rem; color: rgba(255,255,255,0.4); 
            font-family: 'Orbitron', sans-serif; letter-spacing: 1px; text-transform: uppercase;
        }

        /* Responsive celular */
        @media (max-width: 480px) {
            .top-phrase { font-size: 1.5rem; letter-spacing: 2px; }
            .card { width: 85%; }
        }
    </style>
</head>
<body>

    <div class="top-phrase">¡SÍGUEME EN STREAM!</div>

    <div class="page-counter">
        <i class="fa-solid fa-eye"></i>
        <span id="count">0000</span>
    </div>

    <div class="card">
        <div class="status">● ONLINE</div>
        
        <img src="https://raw.githubusercontent.com/Jocthan-ML/Mi-p-gina-de-stream/main/Yoto%20Logo.png" alt="Yoto GM Logo" class="logo-img">
        
        <div class="descripcion">Streamer Gamer / Content Creator</div>

        <a href="https://kick.com/jocthanM" target="_blank" class="boton btn-kick">
            <div class="k-pixel-logo">K</div>
            <span class="kick-text">KICK</span>
        </a>

        <a href="https://www.youtube.com/@YotoGM" target="_blank" class="boton btn-youtube">
            <i class="fa-brands fa-youtube"></i> YOUTUBE
        </a>

        <a href="https://www.facebook.com/profile.php?id=100092795311838" target="_blank" class="boton btn-facebook">
            <i class="fa-brands fa-facebook"></i> FACEBOOK
        </a>

        <a href="https://www.tiktok.com/@yoto.gm" target="_blank" class="boton btn-tiktok">
            <i class="fa-brands fa-tiktok"></i> TIKTOK
        </a>

        <p class="rights-text">
            © 2026 JOCTHAN M. | TODOS LOS DERECHOS RESERVADOS
        </p>
    </div>

    <script>
        function cb(response) {
            document.getElementById('count').innerText = response.value.toString().padStart(4, '0');
        }
    </script>
    <script async src="https://api.countapi.xyz/hit/jocthan-gp-final-v3/visits?callback=cb"></script>
</body>
</html>
