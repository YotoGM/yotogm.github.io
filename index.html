<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoto[G.M] | Hub Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --fondo: #050505;
            --morado: #bc13fe;
            --verde: #39FF14;
            --kick-verde: #53fc18; /* El verde exacto de Kick */
        }

        body {
            background-color: var(--fondo);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(188, 19, 254, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(57, 255, 20, 0.1) 0%, transparent 40%);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        /* TARJETA PRINCIPAL */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(188, 19, 254, 0.4);
            border-radius: 24px;
            padding: 40px 30px;
            width: 350px;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            z-index: 999;
        }

        .logo-img {
            width: 100%;
            max-width: 250px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px var(--morado));
        }

        .descripcion {
            font-family: 'Orbitron', sans-serif;
            color: var(--verde);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

       .boton {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
            padding: 16px;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.1);
            height: 60px; /* Altura uniforme para todos */
            box-sizing: border-box;
        }

        /* --- BOTÓN KICK PERSONALIZADO --- */
        .btn-kick {
            background: #000;
            border: 1px solid var(--kick-verde);
            box-shadow: 0 0 10px rgba(83, 252, 24, 0.2);
            /* Importante: para que el logo se vea nítido */
            image-rendering: pixelated; 
        }

        /* El logo completo de la imagen (Círculo pixelado con la K) */
        .kick-logo {
            height: 35px; /* Altura del logo dentro del botón */
            width: auto;
            display: block;
        }

        .btn-kick:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(83, 252, 24, 0.4);
        }

        /* --- OTROS BOTONES --- */
        .btn-facebook {
            background: #1877F2;
        }
        
        .btn-tiktok {
            background: #000;
            border: 1px solid #fe2c55;
            box-shadow: -2px -2px 0px #25f4ee, 2px 2px 0px #fe2c55;
        }

        .status {
            color: var(--verde);
            font-size: 0.8rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
  <style>

                -4px -4px 0 -2px #000, 4px -4px 0 -2px #000,
                -4px 4px 0 -2px #000, 4px 4px 0 -2px #000;

        /* El texto KICK con fuente pixelada */

            gap: 12px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            box-shadow: -2px -2px 0px #25f4ee, 2px 2px 0px #fe2c55;
        }
    </style>
