<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoto[G.M] | Hub Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --fondo: #050505;
            --morado-vivo: #bc13fe;
            --verde-neon: #39FF14;
            --cristal: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--fondo);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(188, 19, 254, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(57, 255, 20, 0.1) 0%, transparent 40%);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background: var(--cristal);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(188, 19, 254, 0.3);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* Tu Logo */
        .logo-img {
            width: 100%;
            max-width: 250px;
            height: auto;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px var(--morado-vivo));
        }

        .descripcion {
            font-family: 'Orbitron', sans-serif;
            color: var(--verde-neon);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .card::before {
            content: "";
            position: absolute;
            top: -2px; left: -2px;
            width: 50px; height: 50px;
            border-top: 3px solid var(--verde-neon);
            border-left: 3px solid var(--verde-neon);
            border-radius: 24px 0 0 0;
        }

        .status {
            color: var(--verde-neon);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            opacity: 0.8;
        }

        .punto-vivo {
            width: 6px; height: 6px;
            background-color: var(--verde-neon);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--verde-neon);
            animation: pulso 1.5s infinite;
        }

        @keyframes pulso {
            0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; }
        }

        .boton {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 15px 0;
            padding: 16px;
            background: linear-gradient(45deg, rgba(188, 19, 254, 0.1), transparent);
            color: white;
            text-decoration: none;
            border: 1px solid rgba(188, 19, 254, 0.4);
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .boton:hover {
            border-color: var(--verde-neon);
            background: rgba(57, 255, 20, 0.08);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.4);
            transform: scale(1.03);
            color: var(--verde-neon);
        }

        .footer-text {
            margin-top: 30px;
            font-size: 0.7rem;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="status">
            <div class="punto-vivo"></div> SISTEMA ACTIVO
        </div>
        
        <img src="logo.jpg" alt="Yoto GM Logo" class="logo-img">
        
        <div class="descripcion">Streamer Gamer / Content Creator</div>
        
        <a href="https://kick.com/jocthanM" target="_blank" class="boton">
            <i class="fa-solid fa-k"></i> KICK
        </a>

        <a href="https://www.facebook.com/profile.php?id=100092795311838" target="_blank" class="boton">
            <i class="fa-brands fa-facebook"></i> FACEBOOK
        </a>

        <a href="https://www.tiktok.com/@yoto.gm" target="_blank" class="boton">
            <i class="fa-brands fa-tiktok"></i> TIKTOK
        </a>
        
        <p class="footer-text">© 2026 Powered by Yoto [G.M]</p>
    </div>

</body>
</html>
