<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoto[G.M] | Hub Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fondo: #050505;
            --morado-vivo: #bc13fe; /* Un morado mucho más brillante */
            --verde-neon: #39FF14;
            --cristal: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--fondo);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(188, 19, 254, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(57, 255, 20, 0.1) 0%, transparent 40%);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background: var(--cristal);
            backdrop-filter: blur(15px); /* Efecto de vidrio esmerilado */
            border: 1px solid rgba(188, 19, 254, 0.3);
            border-radius: 24px;
            padding: 50px 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* Detalle decorativo de esquina */
        .card::before {
            content: "";
            position: absolute;
            top: -2px; left: -2px;
            width: 50px; height: 50px;
            border-top: 3px solid var(--verde-neon);
            border-left: 3px solid var(--verde-neon);
            border-radius: 24px 0 0 0;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            color: white;
            text-shadow: 0 0 10px var(--morado-vivo);
            margin-bottom: 5px;
            letter-spacing: 3px;
        }

        .status {
            color: var(--verde-neon);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .punto-vivo {
            width: 8px; height: 8px;
            background-color: var(--verde-neon);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--verde-neon);
            animation: pulso 1.5s infinite;
        }

        @keyframes pulso {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .boton {
            display: block;
            margin: 15px 0;
            padding: 16px;
            background: linear-gradient(45deg, rgba(188, 19, 254, 0.1), transparent);
            color: white;
            text-decoration: none;
            border: 1px solid rgba(188, 19, 254, 0.5);
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .boton:hover {
            border-color: var(--verde-neon);
            background: rgba(57, 255, 20, 0.05);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.4);
            transform: scale(1.03);
            color: var(--verde-neon);
        }

        .footer-text {
            margin-top: 30px;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="status">
            <div class="punto-vivo"></div> SISTEMA ACTIVO
        </div>
        <h1>Yoto[G.M]</h1>
        <p style="color: #aaa; margin-bottom: 30px;">Digital Creator & Content Hub</p>
        
        <a href="https://kick.com/jocthanM" class="boton">
            <i class="fa-solid fa-play"></i> KICK LIVE
        </a>
        <a href="https://www.facebook.com/profile.php?id=100092795311838" class="boton">
            <i class="fa-brands fa-facebook"></i> FACEBOOK
        </a>
        <a href="https://www.tiktok.com/@yoto.gm" class="boton">
            <i class="fa-brands fa-tiktok"></i> TIKTOK
        </a>
        
        <p class="footer-text">© 2026 Powered by Yoto [G.M]</p>
    </div>

</body>
</html>
